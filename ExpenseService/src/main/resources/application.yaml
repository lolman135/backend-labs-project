spring:
  application:
    name: ExpenseService

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/expense_db}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${SERVER_PORT:8083}

user-service:
  url: ${USER_URL:http://localhost:8082}

currency-service:
  url: ${CURRENCY_URL:http://localhost:8084}