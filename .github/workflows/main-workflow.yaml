name: Master CI/CD Pipeline
on:
  push:
    branches:
      - master
      - dev
  workflow_dispatch:
jobs:

  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - id: set-matrix
        run: |
          SERVICES=$(ls -d *Service/ | sed 's/\///' | jq -R -s -c 'split("\n")[:-1] | map({name: ., image: . | ascii_downcase})')
          echo "matrix=${SERVICES}" >> $GITHUB_OUTPUT

  test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests
        run: ./gradlew :${{ matrix.service.name }}:clean :${{ matrix.service.name }}:test

  build-push:
    needs:
      - setup
      - test
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.setup.outputs.matrix) }}
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Build JARs
        run: ./gradlew :${{ matrix.service.name }}:clean :${{ matrix.service.name }}:bootJar -x test

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor}}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service.name }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/devops-labs/${{ matrix.service.image }}:latest
            ghcr.io/${{ github.repository_owner }}/devops-labs/${{ matrix.service.image }}:${{ github.run_number }}

  deploy:
    needs:
      - setup
      - build-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/dev'
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Set environment context
        id: env-setup
        run: |
          if [[ ${{ github.ref }} == "refs/heads/master" ]]; then
            echo "NAMESPACE=default" >> $GITHUB_ENV
          else
            echo "NAMESPACE=dev" >> $GITHUB_ENV
          fi

      - name: K8S Setup
        uses: azure/k8s-set-context@v5
        with:
          method: 'kubeconfig'
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy Infrastructure
        run: |
          kubectl apply -f deployment/infrastructure/postgres/ -n ${{ env.NAMESPACE }}
          kubectl apply -f deployment/infrastructure/ingress/digital-ocean/ -n ${{ env.NAMESPACE }}

      - name: Deploy Application
        run: |
          SERVICES=(
            "api-gateway-service:apigatewayservice"
            "auth-service:authservice"
            "currency-service:currencyservice"
            "expense-service:expenseservice"
            "healthcheck-service:healthcheckservice"
            "user-service:userservice"
          )
          
          for item in "${SERVICES[@]}"; do
            DIR="${item%%:*}"
            IMAGE_NAME="${item#*:}"
          
            export DEPLOY_IMAGE="ghcr.io/${{ github.repository_owner }}/devops-labs/$IMAGE_NAME:${{ github.run_number }}"
            envsubst < deployment/app/$DIR/*.deploy.yaml | kubectl apply -n ${{ env.NAMESPACE }} -f -
            kubectl apply -f deployment/app/$DIR/*.svc.yaml -n ${{ env.NAMESPACE }}
          done

      - name: Check Status
        run: kubectl get pods -n ${{ env.NAMESPACE}}
