name: Master CI/CD Pipeline

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [ ApiGatewayService, AuthService, CurrencyService, HealthcheckService, UserService, ExpenseService]
    steps:
      - name: Get Code
        uses: actions/checkout@v6

      - name: Set Up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Set Up Gradle
        uses: gradle/actions/setup-gradle@v5

      - name: Run tests
        run: ./gradlew :${{ matrix.service }}:clean :${{ matrix.service }}:test
