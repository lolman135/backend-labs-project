services:

  postgres:
    image: registry.gitlab.com/kkirilll2006/devops-labs/postgres:latest
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: AdminAdmin
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    networks:
      - inner-services

  healthcheck-service:
    image: registry.gitlab.com/kkirilll2006/devops-labs/healthcheck:latest
    container_name: healthcheck-service
    ports:
      - '8081'
    restart: always
    depends_on:
      - postgres
    networks:
      - inner-services

  currency-service:
    image: registry.gitlab.com/kkirilll2006/devops-labs/currency
    container_name: currency-service
    ports:
      - "8084"
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/currency-db:latest
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=AdminAdmin
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
    depends_on:
      - postgres
    networks:
      - inner-services

  user-service:
    image: registry.gitlab.com/kkirilll2006/devops-labs/user:latest
    container_name: user-service
    ports:
      - "8082"
    restart: always
    environment:
      - CURRENCY_SERVICE_URL=http://currency-service:8084
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/user-db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=AdminAdmin
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
    depends_on:
      - postgres
    networks:
      - inner-services

  auth-service:
    image: registry.gitlab.com/kkirilll2006/devops-labs/auth:latest
    container_name: auth-service
    ports:
      - "8085"
    restart: always
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/user-db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=AdminAdmin
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
    depends_on:
      - postgres
    networks:
      - inner-services

  expense-service:
    image: registry.gitlab.com/kkirilll2006/devops-labs/expense:latest
    container_name: expense-service
    ports:
      - "8083"
    environment:
      - USER_SERVICE_URL=http://user-service:8082
      - CURRENCY_SERVICE_URL=http://currency-service:8084
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/expense-db
      - SPRING_DATASOURCE_USERNAME=admin
      - SPRING_DATASOURCE_PASSWORD=AdminAdmin
      - SPRING_FLYWAY_BASELINE_ON_MIGRATE=true
    depends_on:
      - postgres
    networks:
      - inner-services

  api-gateway-service:
    image: registry.gitlab.com/kkirilll2006/devops-labs/gateway:latest
    container_name: api-gateway-service
    ports:
      - "8080:8080"
    environment:
      - HEALTHCHECK_URL=http://healthcheck-service:8081
      - USER_URL=http://user-service:8082
      - EXPENSE_URL=http://expense-service:8083
      - CURRENCY_URL=http://currency-service:8084
      - AUTH_URL=http://auth-service:8085
    networks:
      - inner-services

volumes:
  postgres-data:

networks:
  inner-services:
    driver: bridge